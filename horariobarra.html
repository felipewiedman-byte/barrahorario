<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solar Bar · Tiempo Real · Tuluá · 100% FUNCIONAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== DISEÑO ORIGINAL SIN BARRA INFERIOR ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:'Inter',sans-serif;
}

.solar-bar{
  width:580px;
  height:130px;
  border-radius:24px;
  overflow:hidden !important;
  position:relative;
  backface-visibility: hidden;
}

.fondo-dinamico{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:24px;
  overflow:hidden;
  z-index:1;
}

.capa-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #4AB5FF, #2A7FDD, #1A4FAA);
  opacity:1;
  transition:opacity 0.5s ease;
  z-index:1;
}

.capa-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #0A1428, #0B1A2E, #0A1A2C);
  opacity:0;
  transition:opacity 0.5s ease;
  z-index:2;
}

/* ===== MÁSCARAS ===== */
.mascara-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-dia::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(74,181,255,1) 0%,
    rgba(74,181,255,0.9) 25%,
    rgba(74,181,255,0) 50%,
    rgba(10,20,40,0.9) 75%,
    rgba(10,20,40,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:3;
  left:-50%;
}

.mascara-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:4;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-noche::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(10,20,40,1) 0%,
    rgba(10,20,40,0.9) 25%,
    rgba(10,20,40,0) 50%,
    rgba(74,181,255,0.9) 75%,
    rgba(74,181,255,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:4;
  left:-50%;
}

.sombra-lunar{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:7;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  mix-blend-mode:multiply;
}

.estrellas{
  position:absolute;
  width:100%;
  height:100%;
  z-index:5;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  overflow:hidden;
  pointer-events:none;
}

.estrellas span{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(255,255,255,0.5);
}

.horizonte{
  position:absolute;
  bottom:0;
  width:100%;
  height:40px;
  background:linear-gradient(180deg, #3a2c24, #1e1612);
  border-top:1px solid rgba(200,170,140,0.3);
  z-index:10;
  border-radius:0 0 24px 24px;
}

.horas{
  position:absolute;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:9px;
  font-weight:400;
  color:rgba(255,255,255,0.5);
  z-index:15;
  letter-spacing:0.5px;
}

.astro{
  position:absolute;
  top:45% !important;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  z-index:30;
  transition:left 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
  animation:flotar 5s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

@keyframes flotar{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-56%) scale(1.02);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

.astro svg{
  width:100%;
  height:100%;
  display:block;
}

.tag{
  position:absolute;
  font-size:10px;
  font-weight:500;
  color:#ffffff;
  background:rgba(0,0,0,0.65);
  padding:5px 12px;
  border-radius:40px;
  white-space:nowrap;
  z-index:35;
  border:1px solid rgba(255,215,0,0.3);
  letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

.sol-tag{
  left:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.luna-tag{
  right:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.divider{
  position:absolute;
  left:50%;
  top:0;
  width:1px;
  height:100%;
  background:rgba(255,255,200,0.08);
  z-index:8;
}

.linea{
  position:absolute;
  bottom:40px;
  left:0;
  width:100%;
  height:1px;
  background:rgba(255,220,150,0.15);
  z-index:9;
}

/* ===== EFECTOS DE CLIMA ===== */
.gota{
  position:absolute;
  width:2px;
  background:rgba(255,255,255,0.7);
  border-radius:0 0 5px 5px;
  animation:llover linear infinite;
  z-index:6;
}

@keyframes llover{
  0%{transform:translateY(-20px); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(150px); opacity:0;}
}

.gota-noche{
  background:rgba(180,200,255,0.6);
}

.nube{
  position:absolute;
  background:rgba(255,255,255,0.3);
  border-radius:50px;
  filter:blur(10px);
  animation:flotarNube linear infinite;
  z-index:6;
}

.nube-dia{
  background:rgba(255,255,255,0.4);
}

.nube-noche{
  background:rgba(100,120,150,0.3);
}

@keyframes flotarNube{
  0%{left:-100px;}
  100%{left:700px;}
}

.rayo{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.4);
  opacity:0;
  animation:relampago 5s infinite;
  z-index:6;
}

@keyframes relampago{
  0%,95%,98%{opacity:0;}
  96%{opacity:0.5;}
  97%{opacity:0;}
}
</style>
</head>
<body>

<div class="solar-bar">
  <div class="fondo-dinamico">
    <div class="capa-dia" id="capaDia"></div>
    <div class="capa-noche" id="capaNoche"></div>
  </div>
  
  <div class="mascara-dia" id="mascaraDia"></div>
  <div class="mascara-noche" id="mascaraNoche"></div>

  <div class="sombra-lunar" id="sombraLunar"></div>

  <!-- CAPA DE CLIMA -->
  <div id="climaCapa" style="position:absolute; width:100%; height:100%; z-index:6; pointer-events:none; overflow:hidden; border-radius:24px;"></div>

  <div class="estrellas" id="estrellas">
    <span style="top:15%;left:55%"></span>
    <span style="top:25%;left:62%"></span>
    <span style="top:35%;left:70%"></span>
    <span style="top:45%;left:78%"></span>
    <span style="top:55%;left:85%"></span>
    <span style="top:20%;left:90%"></span>
    <span style="top:65%;left:72%"></span>
    <span style="top:75%;left:45%"></span>
    <span style="top:30%;left:30%"></span>
    <span style="top:80%;left:15%"></span>
  </div>

  <div class="horizonte"></div>
  <div class="linea"></div>

  <div class="horas">
    <span>00</span> <span>03</span> <span>06</span> <span>09</span> <span>12</span>
    <span>15</span> <span>18</span> <span>21</span> <span>24</span>
  </div>

  <div class="divider"></div>

  <!-- SOL -->
  <div id="sol" class="astro">
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="sol-grad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFD966" />
          <stop offset="40%" stop-color="#FFA500" />
          <stop offset="80%" stop-color="#FF4500" />
          <stop offset="100%" stop-color="#FF8C00" />
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="20" fill="url(#sol-grad)" />
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFD966" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.4" />
    </svg>
    <div id="solTag" class="tag sol-tag">☀️ 00:00</div>
  </div>

  <!-- LUNA CON FASES REALES -->
  <div id="luna" class="astro">
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="luna-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#FFFFFF" />
          <stop offset="70%" stop-color="#FFF2A6" />
          <stop offset="100%" stop-color="#E6D896" />
        </radialGradient>
        <radialGradient id="luna-sombra-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#777777" stop-opacity="0.8" />
          <stop offset="70%" stop-color="#666666" stop-opacity="0.8" />
          <stop offset="100%" stop-color="#555555" stop-opacity="0.8" />
        </radialGradient>
        <radialGradient id="crater-grad" cx="30%" cy="30%" r="50%">
          <stop offset="0%" stop-color="#D4C87C" stop-opacity="0.6" />
          <stop offset="100%" stop-color="#B8A878" stop-opacity="0.3" />
        </radialGradient>
        
        <mask id="mascara-fase-lunar">
          <rect x="0" y="0" width="48" height="48" fill="white" />
          <circle id="sombra-movil" cx="24" cy="24" r="24" fill="black" />
        </mask>
      </defs>
      
      <circle cx="24" cy="24" r="22" fill="url(#luna-grad)"/>
      <circle cx="16" cy="17" r="6" fill="url(#crater-grad)"/>
      <circle cx="33" cy="30" r="5.5" fill="url(#crater-grad)"/>
      <circle cx="29" cy="15" r="5" fill="url(#crater-grad)"/>
      
      <circle cx="24" cy="24" r="22" fill="url(#luna-sombra-grad)" mask="url(#mascara-fase-lunar)"/>
      
      <circle cx="24" cy="24" r="26" fill="none" stroke="#FFF2A6" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4"/>
    </svg>
    <div id="lunaTag" class="tag luna-tag">🌑 00:00</div>
  </div>
</div>

<script>
// ===== OPEN-METEO CLIMA + SOL/LUNA REAL =====
const sol = document.getElementById("sol");
const luna = document.getElementById("luna");
const solTag = document.getElementById("solTag");
const lunaTag = document.getElementById("lunaTag");
const sombraMovil = document.getElementById("sombra-movil");
const estrellas = document.getElementById("estrellas");
const mascaraDia = document.getElementById("mascaraDia");
const mascaraNoche = document.getElementById("mascaraNoche");
const capaDia = document.getElementById("capaDia");
const capaNoche = document.getElementById("capaNoche");
const climaCapa = document.getElementById("climaCapa");
const sombraLunar = document.getElementById("sombraLunar");

const LAT = '4.0929';
const LON = '-76.2165';

let climaActual = '';

function getHoraColombia(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}

function formatHora(h){
  let H = Math.floor(h);
  let m = Math.floor((h - H) * 60);
  return `${String(H).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

function calcularFaseLunar() {
  const ahora = new Date();
  const lunaNueva = new Date(Date.UTC(2024, 2, 6, 12, 0, 0));
  const ciclo = 29.530588853 * 24 * 60 * 60 * 1000;
  const diff = ahora - lunaNueva;
  return ((diff / ciclo) % 1 + 1) % 1;
}

function actualizarMascaraLunar(fase) {
  if (!sombraMovil) return;
  let cx;
  if (fase < 0.5) cx = 48 - (fase * 96);
  else cx = (fase - 0.5) * 96;
  cx = Math.max(0, Math.min(48, cx));
  sombraMovil.setAttribute('cx', cx);
}

function getFaseLunarInfo(f) {
  if (f < 0.03 || f > 0.97) return { emoji: '🌑', nombre: 'Nueva' };
  if (f < 0.23) return { emoji: '🌒', nombre: 'Creciente' };
  if (f < 0.27) return { emoji: '🌓', nombre: 'Cuarto Creciente' };
  if (f < 0.47) return { emoji: '🌔', nombre: 'Gibosa Creciente' };
  if (f < 0.53) return { emoji: '🌕', nombre: 'Llena' };
  if (f < 0.73) return { emoji: '🌖', nombre: 'Gibosa Menguante' };
  if (f < 0.77) return { emoji: '🌗', nombre: 'Cuarto Menguante' };
  return { emoji: '🌘', nombre: 'Menguante' };
}

function getDescripcionFromCode(code) {
  code = parseInt(code);
  if (code === 0) return 'DESPEJADO';
  if (code === 1) return 'MAYORMENTE DESPEJADO';
  if (code === 2) return 'PARCIALMENTE NUBLADO';
  if (code === 3) return 'NUBLADO';
  if (code >= 45 && code <= 48) return 'NIEBLA';
  if ((code >= 51 && code <= 55) || (code >= 56 && code <= 57)) return 'LLOVIZNA';
  if ((code >= 61 && code <= 65) || (code >= 66 && code <= 67)) return 'LLUVIA';
  if ((code >= 71 && code <= 75) || (code >= 80 && code <= 82) || (code >= 85 && code <= 86)) return 'LLUVIA';
  if (code >= 95) return 'TORMENTA';
  return 'PARCIALMENTE NUBLADO';
}

function crearElementosClima(tipo, cantidad, esNoche){
  const fragment = document.createDocumentFragment();
  for(let i = 0; i < cantidad; i++){
    let el;
    if(tipo === 'lluvia' || tipo === 'tormenta'){
      el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (tipo === 'tormenta' ? 0.3 : 0.5) + Math.random() * 0.3 + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (tipo === 'tormenta' ? 10 : 8) + Math.random() * 10 + 'px';
    }
    if(tipo === 'nube'){
      el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 50 + Math.random() * 50 + 'px';
      el.style.height = 15 + Math.random() * 20 + 'px';
      el.style.top = 10 + Math.random() * 50 + '%';
      el.style.animationDuration = 12 + Math.random() * 10 + 's';
      el.style.animationDelay = -i * 4 + 's';
    }
    if(el) fragment.appendChild(el);
  }
  return fragment;
}

function actualizarClimaFondo(desc, esNoche){
  if(!climaCapa) return;
  while(climaCapa.firstChild) climaCapa.removeChild(climaCapa.firstChild);
  const d = desc.toLowerCase();
  if(d.includes('tormenta')){
    const rayo = document.createElement('div');
    rayo.className = 'rayo';
    climaCapa.appendChild(rayo);
    climaCapa.appendChild(crearElementosClima('tormenta', 40, esNoche));
  }
  else if(d.includes('lluvia') || d.includes('llovizna') || d.includes('chubascos')){
    climaCapa.appendChild(crearElementosClima('lluvia', 30, esNoche));
  }
  if(d.includes('nublado') && !d.includes('parcial')){
    climaCapa.appendChild(crearElementosClima('nube', 3, esNoche));
  }
}

function fetchClima(){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&timezone=auto`;
  fetch(url)
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      const weather = data.current_weather;
      const weatherCode = weather.weathercode;
      const isDay = weather.is_day === 1;
      const descripcion = getDescripcionFromCode(weatherCode);
      const descKey = descripcion + (isDay ? '-dia' : '-noche');
      if(descKey !== climaActual){
        climaActual = descKey;
        actualizarClimaFondo(descripcion, !isDay);
      }
    })
    .catch(e => console.warn('Clima offline', e));
}

function actualizar(){
  let now = getHoraColombia();
  let h = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  let esNoche = now.getHours() < 6 || now.getHours() >= 18;

  let solPos = h / 24;
  let lunaPos = (h + 12) / 24;
  if(lunaPos > 1) lunaPos -= 1;

  sol.style.left = (solPos * 100) + "%";
  luna.style.left = (lunaPos * 100) + "%";

  solTag.innerHTML = `☀️ ${formatHora(h)}`;
  
  const fase = calcularFaseLunar();
  const faseInfo = getFaseLunarInfo(fase);
  actualizarMascaraLunar(fase);
  lunaTag.innerHTML = `${faseInfo.emoji} ${formatHora((h+12)%24)}`;

  let desplazamientoDia = (solPos * 100) - 50;
  mascaraDia.style.transform = `translateX(${desplazamientoDia}%)`;
  let desplazamientoNoche = (lunaPos * 100) - 50;
  mascaraNoche.style.transform = `translateX(${desplazamientoNoche}%)`;
  
  // Control día/noche
  if (h >= 6 && h < 18) {
    estrellas.style.opacity = '0';
    capaNoche.style.opacity = '0';
    capaDia.style.opacity = '1';
    sombraLunar.style.opacity = '0';
  } else {
    estrellas.style.opacity = '0.7';
    capaNoche.style.opacity = '1';
    capaDia.style.opacity = '0';
    const distanciaCentro = Math.abs(lunaPos - 0.5) * 2;
    const brilloLunar = fase < 0.03 || fase > 0.97 ? 0.2 :
                        fase > 0.47 && fase < 0.53 ? 0.8 : 0.5;
    sombraLunar.style.opacity = (distanciaCentro * (1 - brilloLunar * 0.7)).toString();
    sombraLunar.style.background = `radial-gradient(circle at ${lunaPos * 100}% 50%, 
                                    rgba(0,0,0,0) 0%, 
                                    rgba(0,0,0,0.7) 70%)`;
  }
}

fetchClima();
setInterval(fetchClima, 600000);
setInterval(actualizar, 500);
actualizar();
setTimeout(() => actualizarMascaraLunar(calcularFaseLunar()), 500);
</script>
</body>
</html>
