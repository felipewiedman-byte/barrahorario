<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solar Bar · Tiempo Real · Tuluá · Fases Lunares CORREGIDAS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== DISEÑO ORIGINAL SIN BARRA INFERIOR ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:'Inter',sans-serif;
}

.solar-bar{
  width:580px;
  height:130px;
  border-radius:24px;
  overflow:hidden !important;
  position:relative;
  backface-visibility: hidden;
}

.fondo-dinamico{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:24px;
  overflow:hidden;
  z-index:1;
}

.capa-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #4AB5FF, #2A7FDD, #1A4FAA);
  opacity:1;
  transition:opacity 0.5s ease;
  z-index:1;
}

.capa-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #0A1428, #0B1A2E, #0A1A2C);
  opacity:0;
  transition:opacity 0.5s ease;
  z-index:2;
}

/* ===== MÁSCARAS ===== */
.mascara-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-dia::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(74,181,255,1) 0%,
    rgba(74,181,255,0.9) 25%,
    rgba(74,181,255,0) 50%,
    rgba(10,20,40,0.9) 75%,
    rgba(10,20,40,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:3;
  left:-50%;
}

.mascara-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:4;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-noche::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(10,20,40,1) 0%,
    rgba(10,20,40,0.9) 25%,
    rgba(10,20,40,0) 50%,
    rgba(74,181,255,0.9) 75%,
    rgba(74,181,255,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:4;
  left:-50%;
}

.sombra-lunar{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:7;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  mix-blend-mode:multiply;
}

.estrellas{
  position:absolute;
  width:100%;
  height:100%;
  z-index:5;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  overflow:hidden;
  pointer-events:none;
}

.estrellas span{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(255,255,255,0.5);
  animation:parpadear 1.5s ease-in-out infinite;
}

@keyframes parpadear{
  0%,100%{opacity:0.3;}
  50%{opacity:1;}
}

.horizonte{
  position:absolute;
  bottom:0;
  width:100%;
  height:40px;
  background:linear-gradient(180deg, #3a2c24, #1e1612);
  border-top:1px solid rgba(200,170,140,0.3);
  z-index:10;
  border-radius:0 0 24px 24px;
}

.horas{
  position:absolute;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:9px;
  font-weight:400;
  color:rgba(255,255,255,0.5);
  z-index:15;
  letter-spacing:0.5px;
}

.astro{
  position:absolute;
  top:45% !important;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  z-index:30;
  transition:left 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
  animation:flotar 5s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

@keyframes flotar{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-56%) scale(1.02);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

.astro svg{
  width:100%;
  height:100%;
  display:block;
}

.tag{
  position:absolute;
  font-size:10px;
  font-weight:500;
  color:#ffffff;
  background:rgba(0,0,0,0.65);
  padding:5px 12px;
  border-radius:40px;
  white-space:nowrap;
  z-index:35;
  border:1px solid rgba(255,215,0,0.3);
  letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

.sol-tag{
  left:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.luna-tag{
  right:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.divider{
  position:absolute;
  left:50%;
  top:0;
  width:1px;
  height:100%;
  background:rgba(255,255,200,0.08);
  z-index:8;
}

.linea{
  position:absolute;
  bottom:40px;
  left:0;
  width:100%;
  height:1px;
  background:rgba(255,220,150,0.15);
  z-index:9;
}

/* ===== EFECTOS DE CLIMA MEJORADOS ===== */
.gota{
  position:absolute;
  width:3px;
  background:linear-gradient(180deg, rgba(200,230,255,0.9), rgba(150,200,255,0.3));
  border-radius:0 0 3px 3px;
  animation:llover linear infinite;
  z-index:6;
}

@keyframes llover{
  0%{transform:translateY(-20px); opacity:0;}
  20%{opacity:0.8;}
  100%{transform:translateY(150px); opacity:0;}
}

.gota-noche{
  background:linear-gradient(180deg, rgba(180,200,255,0.8), rgba(100,150,200,0.2));
}

.nube{
  position:absolute;
  background:rgba(255,255,255,0.5);
  border-radius:50px;
  filter:blur(12px);
  animation:flotarNube linear infinite;
  z-index:6;
  box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.nube-dia{
  background:rgba(255,255,255,0.6);
}

.nube-noche{
  background:rgba(150,170,200,0.4);
}

@keyframes flotarNube{
  0%{left:-120px;}
  100%{left:620px;}
}

.rayo{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 50% 40%, rgba(255,255,200,0.8), rgba(255,200,100,0.4), transparent);
  opacity:0;
  animation:relampago 4s infinite;
  z-index:6;
}

@keyframes relampago{
  0%,92%,94%,96%,98%,100%{opacity:0;}
  93%{opacity:0.6;}
  95%{opacity:0.8;}
  97%{opacity:0.4;}
  99%{opacity:0.2;}
}
</style>
</head>
<body>

<div class="solar-bar">
  <div class="fondo-dinamico">
    <div class="capa-dia" id="capaDia"></div>
    <div class="capa-noche" id="capaNoche"></div>
  </div>
  
  <div class="mascara-dia" id="mascaraDia"></div>
  <div class="mascara-noche" id="mascaraNoche"></div>

  <div class="sombra-lunar" id="sombraLunar"></div>

  <!-- CAPA DE CLIMA -->
  <div id="climaCapa" style="position:absolute; width:100%; height:100%; z-index:6; pointer-events:none; overflow:hidden; border-radius:24px;"></div>

  <div class="estrellas" id="estrellas">
    <span style="top:15%;left:55%;animation-delay:0s"></span>
    <span style="top:25%;left:62%;animation-delay:0.5s"></span>
    <span style="top:35%;left:70%;animation-delay:1s"></span>
    <span style="top:45%;left:78%;animation-delay:1.5s"></span>
    <span style="top:55%;left:85%;animation-delay:2s"></span>
    <span style="top:20%;left:90%;animation-delay:2.5s"></span>
    <span style="top:65%;left:72%;animation-delay:3s"></span>
    <span style="top:75%;left:45%;animation-delay:0.2s"></span>
    <span style="top:30%;left:30%;animation-delay:0.7s"></span>
    <span style="top:80%;left:15%;animation-delay:1.2s"></span>
    <span style="top:12%;left:40%;animation-delay:1.8s"></span>
    <span style="top:70%;left:55%;animation-delay:2.2s"></span>
    <span style="top:40%;left:85%;animation-delay:2.8s"></span>
  </div>

  <div class="horizonte"></div>
  <div class="linea"></div>

  <div class="horas">
    <span>00</span> <span>03</span> <span>06</span> <span>09</span> <span>12</span>
    <span>15</span> <span>18</span> <span>21</span> <span>24</span>
  </div>

  <div class="divider"></div>

  <!-- SOL -->
  <div id="sol" class="astro">
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="sol-grad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFD966" />
          <stop offset="40%" stop-color="#FFA500" />
          <stop offset="80%" stop-color="#FF4500" />
          <stop offset="100%" stop-color="#FF8C00" />
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="20" fill="url(#sol-grad)" />
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFD966" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.4" />
    </svg>
    <div id="solTag" class="tag sol-tag">☀️ 00:00</div>
  </div>

  <!-- LUNA CON FASES REALES - VERSIÓN CORREGIDA -->
  <div id="luna" class="astro">
    <svg viewBox="0 0 48 48" id="lunaSvg">
      <defs>
        <radialGradient id="luna-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#FFF9E6" />
          <stop offset="70%" stop-color="#FFEFB0" />
          <stop offset="100%" stop-color="#F0E090" />
        </radialGradient>
        
        <!-- MÁSCARA DINÁMICA PARA LA FASE LUNAR -->
        <mask id="faseMask">
          <rect x="0" y="0" width="48" height="48" fill="white" />
          <circle id="sombraFase" cx="24" cy="24" r="24" fill="black" />
        </mask>
      </defs>
      
      <!-- Base de la luna (parte visible) -->
      <circle cx="24" cy="24" r="22" fill="url(#luna-grad)" />
      
      <!-- Cráteres decorativos -->
      <circle cx="16" cy="17" r="3.5" fill="rgba(180,150,80,0.5)" />
      <circle cx="33" cy="30" r="3" fill="rgba(160,130,70,0.5)" />
      <circle cx="29" cy="15" r="2.5" fill="rgba(170,140,75,0.5)" />
      <circle cx="38" cy="20" r="2" fill="rgba(150,120,65,0.5)" />
      <circle cx="10" cy="32" r="2" fill="rgba(155,125,70,0.5)" />
      
      <!-- SOMBRA DE FASE LUNAR (esto crea el efecto de fase real) -->
      <circle cx="24" cy="24" r="22" fill="rgba(80,70,50,0.85)" mask="url(#faseMask)" />
      
      <!-- Borde brillante -->
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFF2A6" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4"/>
    </svg>
    <div id="lunaTag" class="tag luna-tag">🌑 00:00</div>
  </div>
</div>

<script>
// ===== OPEN-METEO CLIMA EN TIEMPO REAL + SOL/LUNA CON FASES CORREGIDAS =====
const sol = document.getElementById("sol");
const luna = document.getElementById("luna");
const solTag = document.getElementById("solTag");
const lunaTag = document.getElementById("lunaTag");
const sombraFase = document.getElementById("sombraFase");
const estrellas = document.getElementById("estrellas");
const mascaraDia = document.getElementById("mascaraDia");
const mascaraNoche = document.getElementById("mascaraNoche");
const capaDia = document.getElementById("capaDia");
const capaNoche = document.getElementById("capaNoche");
const climaCapa = document.getElementById("climaCapa");
const sombraLunar = document.getElementById("sombraLunar");

const LAT = '4.08466';
const LON = '-76.19536';

let climaActual = '';

function getHoraColombia(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}

function formatHora(h){
  let H = Math.floor(h);
  let m = Math.floor((h - H) * 60);
  return `${String(H).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

// ========== CÁLCULO DE FASE LUNAR CORREGIDO EN TIEMPO REAL ==========
// Usamos una referencia de Luna Nueva exacta y reciente para máxima precisión.
// Nueva Luna documentada: 19 de marzo de 2026 a las 10:23 UTC (fecha real)
// Para fechas posteriores, el algoritmo mantiene exactitud gracias al ciclo sinódico.
function calcularFaseLunar() {
  // Referencia: Luna Nueva del 19 de marzo de 2026 a las 10:23 UTC
  const newMoonDate = new Date(Date.UTC(2026, 2, 19, 10, 23, 0)); // Mes 2 = Marzo
  const ahora = new Date();
  // Diferencia en milisegundos
  const diffMs = ahora - newMoonDate;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  const cicloLunar = 29.53058867; // días
  // Calculamos fase en el rango [0, 1)
  let fase = (diffDays % cicloLunar) / cicloLunar;
  if (fase < 0) fase += 1;
  return fase;
}

// ACTUALIZAR MÁSCARA DE FASE LUNAR
function actualizarMascaraLunar(fase) {
  if (!sombraFase) return;
  // fase: 0 = Luna Nueva, 0.5 = Luna Llena
  // Calcular posición de la sombra para el efecto visual real:
  // Para fases crecientes (0 -> 0.5): la sombra (parte oscura) se desplaza hacia la izquierda,
  // dejando visible una creciente a la derecha.
  // Para fases menguantes (0.5 -> 1): la sombra se desplaza hacia la derecha,
  // dejando visible la parte izquierda.
  let cx;
  if (fase <= 0.5) {
    // Creciente: sombra a la izquierda. En nueva (fase=0) cx=24 (centro, cubre todo).
    // A medida que crece, la sombra se corre a la izquierda (cx decrece).
    cx = 24 - (fase * 48);
  } else {
    // Menguante: sombra a la derecha. En llena (fase=0.5) cx=0 (fuera), en menguante avanza a la derecha.
    cx = 24 + ((fase - 0.5) * 48);
  }
  // Limitar valores dentro del área visible
  cx = Math.max(0, Math.min(48, cx));
  sombraFase.setAttribute('cx', cx);
  
  // Log para depuración (opcional)
  const fasePorcentaje = Math.round(fase * 100);
  console.log(`🌙 Fase lunar real: ${fasePorcentaje}% | Posición sombra: ${Math.round(cx)}px`);
}

function getFaseLunarInfo(f) {
  // Umbrales para los nombres y emojis según fase real
  if (f < 0.03 || f > 0.97) return { emoji: '🌑', nombre: 'Luna Nueva' };
  if (f < 0.23) return { emoji: '🌒', nombre: 'Creciente' };
  if (f < 0.27) return { emoji: '🌓', nombre: 'Cuarto Creciente' };
  if (f < 0.47) return { emoji: '🌔', nombre: 'Gibosa Creciente' };
  if (f < 0.53) return { emoji: '🌕', nombre: 'Luna Llena' };
  if (f < 0.73) return { emoji: '🌖', nombre: 'Gibosa Menguante' };
  if (f < 0.77) return { emoji: '🌗', nombre: 'Cuarto Menguante' };
  return { emoji: '🌘', nombre: 'Menguante' };
}

function getDescripcionFromCode(code) {
  code = parseInt(code);
  if (code === 0) return 'DESPEJADO';
  if (code === 1) return 'MAYORMENTE DESPEJADO';
  if (code === 2) return 'PARCIALMENTE NUBLADO';
  if (code === 3) return 'NUBLADO';
  if (code >= 45 && code <= 48) return 'NIEBLA';
  if ((code >= 51 && code <= 55) || (code >= 56 && code <= 57)) return 'LLOVIZNA';
  if ((code >= 61 && code <= 65) || (code >= 66 && code <= 67)) return 'LLUVIA';
  if ((code >= 71 && code <= 75) || (code >= 80 && code <= 82) || (code >= 85 && code <= 86)) return 'LLUVIA';
  if (code >= 95) return 'TORMENTA';
  return 'PARCIALMENTE NUBLADO';
}

function crearElementosClima(tipo, cantidad, esNoche){
  const fragment = document.createDocumentFragment();
  
  if(tipo === 'tormenta'){
    const rayoDiv = document.createElement('div');
    rayoDiv.className = 'rayo';
    fragment.appendChild(rayoDiv);
    
    for(let i = 0; i < cantidad + 20; i++){
      const el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (0.2 + Math.random() * 0.3) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (12 + Math.random() * 15) + 'px';
      el.style.width = '4px';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'lluvia'){
    for(let i = 0; i < cantidad; i++){
      const el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (0.3 + Math.random() * 0.4) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (8 + Math.random() * 12) + 'px';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'nublado'){
    for(let i = 0; i < 4; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 70 + Math.random() * 100 + 'px';
      el.style.height = 25 + Math.random() * 30 + 'px';
      el.style.top = 10 + Math.random() * 55 + '%';
      el.style.animationDuration = 18 + Math.random() * 12 + 's';
      el.style.animationDelay = -i * 4 + 's';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'nube'){
    for(let i = 0; i < cantidad; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 60 + Math.random() * 80 + 'px';
      el.style.height = 20 + Math.random() * 25 + 'px';
      el.style.top = 15 + Math.random() * 50 + '%';
      el.style.animationDuration = 15 + Math.random() * 15 + 's';
      el.style.animationDelay = -i * 5 + 's';
      fragment.appendChild(el);
    }
  }
  return fragment;
}

function actualizarClimaFondo(desc, esNoche){
  if(!climaCapa) return;
  while(climaCapa.firstChild) climaCapa.removeChild(climaCapa.firstChild);
  
  const d = desc.toLowerCase();
  console.log('🌦️ Efecto clima:', d);
  
  if(d.includes('tormenta')){
    climaCapa.appendChild(crearElementosClima('tormenta', 50, esNoche));
  }
  else if(d.includes('lluvia')){
    climaCapa.appendChild(crearElementosClima('lluvia', 35, esNoche));
    climaCapa.appendChild(crearElementosClima('nube', 2, esNoche));
  }
  else if(d.includes('llovizna')){
    climaCapa.appendChild(crearElementosClima('lluvia', 20, esNoche));
  }
  else if(d.includes('nublado')){
    climaCapa.appendChild(crearElementosClima('nublado', 4, esNoche));
  }
  else if(d.includes('parcialmente')){
    climaCapa.appendChild(crearElementosClima('nube', 2, esNoche));
  }
}

function fetchClima(){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&timezone=auto`;
  fetch(url)
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(data => {
      const weather = data.current_weather;
      const weatherCode = weather.weathercode;
      const isDay = weather.is_day === 1;
      const descripcion = getDescripcionFromCode(weatherCode);
      const temp = weather.temperature;
      
      const descKey = descripcion + (isDay ? '-dia' : '-noche');
      if(descKey !== climaActual){
        climaActual = descKey;
        actualizarClimaFondo(descripcion, !isDay);
      }
      
      console.log(`🌡️ Tuluá: ${Math.round(temp)}°C | ${descripcion}`);
    })
    .catch(e => console.warn('⚠️ Clima offline:', e));
}

function actualizar(){
  let now = getHoraColombia();
  let h = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;
  let esNoche = now.getHours() < 6 || now.getHours() >= 18;

  let solPos = h / 24;
  let lunaPos = (h + 12) / 24;
  if(lunaPos > 1) lunaPos -= 1;

  sol.style.left = (solPos * 100) + "%";
  luna.style.left = (lunaPos * 100) + "%";

  solTag.innerHTML = `☀️ ${formatHora(h)}`;
  
  // CALCULAR FASE LUNAR REAL CORREGIDA
  const fase = calcularFaseLunar();
  const faseInfo = getFaseLunarInfo(fase);
  actualizarMascaraLunar(fase);
  lunaTag.innerHTML = `${faseInfo.emoji} ${formatHora((h+12)%24)} | ${faseInfo.nombre}`;

  let desplazamientoDia = (solPos * 100) - 50;
  mascaraDia.style.transform = `translateX(${desplazamientoDia}%)`;
  let desplazamientoNoche = (lunaPos * 100) - 50;
  mascaraNoche.style.transform = `translateX(${desplazamientoNoche}%)`;
  
  // Control día/noche
  if (h >= 6 && h < 18) {
    estrellas.style.opacity = '0';
    capaNoche.style.opacity = '0';
    capaDia.style.opacity = '1';
    sombraLunar.style.opacity = '0';
  } else {
    estrellas.style.opacity = '0.7';
    capaNoche.style.opacity = '1';
    capaDia.style.opacity = '0';
    const distanciaCentro = Math.abs(lunaPos - 0.5) * 2;
    // Brillo lunar basado en fase real
    const brilloLunar = fase < 0.03 || fase > 0.97 ? 0.2 :
                        fase > 0.47 && fase < 0.53 ? 0.8 : 0.5;
    sombraLunar.style.opacity = (distanciaCentro * (1 - brilloLunar * 0.7)).toString();
    sombraLunar.style.background = `radial-gradient(circle at ${lunaPos * 100}% 50%, 
                                    rgba(0,0,0,0) 0%, 
                                    rgba(0,0,0,0.7) 70%)`;
  }
}

// Iniciar todo
fetchClima();
setInterval(fetchClima, 600000); // Cada 10 minutos
setInterval(actualizar, 500);
actualizar();
</script>
</body>
