<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solar Bar · 4:00 AM · Amanecer · Tuluá</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:'Inter',sans-serif;
}

.solar-bar{
  width:580px;
  height:130px;
  border-radius:24px;
  overflow:visible;
  position:relative;
}

/* FONDO DINÁMICO CON GRADIENTE QUE SIGUE AL SOL */
.fondo-dinamico{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:24px;
  overflow:hidden;
  z-index:1;
}

.capa-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #3a7bd5, #1e3a5f, #0b1a2e);
  opacity:1;
  transition:opacity 0.5s ease;
  z-index:1;
}

.capa-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #0a1424, #0b1a2e, #0a1a2c);
  opacity:0;
  transition:opacity 0.5s ease;
  z-index:2;
}

/* MÁSCARA QUE SIGUE A LA LUNA - SIN ANIMACIÓN AUTOMÁTICA */
.mascara-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-noche::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(10,20,36,1) 0%, 
    rgba(10,20,36,0.8) 20%,
    rgba(10,20,36,0) 50%,
    rgba(10,20,36,0.8) 80%,
    rgba(10,20,36,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:3;
}

.fondo::after{
  content:"";
  position:absolute;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:linear-gradient(90deg, transparent, #0a1424 90%);
  z-index:4;
}

.estrellas{
  position:absolute;
  width:100%;
  height:100%;
  z-index:5;
  opacity:0.6; /* Aumentado para que se vean en el amanecer */
  transition:opacity 0.5s ease;
  border-radius:24px;
  overflow:hidden;
  pointer-events:none;
}

.estrellas span{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
}

.horizonte{
  position:absolute;
  bottom:0;
  width:100%;
  height:40px;
  background:linear-gradient(180deg, #3a2c24, #1e1612);
  border-top:1px solid rgba(200,170,140,0.3);
  z-index:10;
  border-radius:0 0 24px 24px;
}

.info-bar{
  position:absolute;
  bottom:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  z-index:15;
  color:#ffffff;
  font-weight:300;
  letter-spacing:0.5px;
  text-shadow:0 1px 3px rgba(0,0,0,0.5);
}

.clima{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:13px;
}

.temperatura{
  font-weight:500;
  color:#ffecb3;
  font-size:16px;
}

.descripcion{
  text-transform:uppercase;
  opacity:0.8;
}

.hora{
  font-size:15px;
  font-weight:400;
  color:#e6eefa;
  font-family:'Inter',monospace;
  letter-spacing:1px;
}

.horas{
  position:absolute;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:9px;
  font-weight:400;
  color:rgba(255,255,255,0.5);
  z-index:15;
  letter-spacing:0.5px;
}

/* ASTROS - BAJADOS */
.astro{
  position:absolute;
  top:45% !important;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  z-index:30;
  transition:left 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
  animation:flotar 5s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

@keyframes flotar{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-56%) scale(1.02);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

.astro svg{
  width:100%;
  height:100%;
  display:block;
}

.tag{
  position:absolute;
  font-size:10px;
  font-weight:500;
  color:#ffffff;
  background:rgba(0,0,0,0.65);
  padding:5px 12px;
  border-radius:40px;
  white-space:nowrap;
  z-index:35;
  border:1px solid rgba(255,215,0,0.3);
  letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

.sol-tag{
  left:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.luna-tag{
  right:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.divider{
  position:absolute;
  left:50%;
  top:0;
  width:1px;
  height:100%;
  background:rgba(255,255,200,0.08);
  z-index:8;
}

.linea{
  position:absolute;
  bottom:40px;
  left:0;
  width:100%;
  height:1px;
  background:rgba(255,220,150,0.15);
  z-index:9;
}

.solar-bar{
  overflow:visible !important;
}

/* EFECTOS DE CLIMA */
.gota{
  position:absolute;
  width:2px;
  background:rgba(255,255,255,0.7);
  border-radius:0 0 5px 5px;
  animation:llover linear infinite;
  z-index:6;
}

@keyframes llover{
  0%{transform:translateY(-20px); opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(150px); opacity:0;}
}

.gota-noche{
  background:rgba(180,200,255,0.6);
}

.nube{
  position:absolute;
  background:rgba(255,255,255,0.3);
  border-radius:50px;
  filter:blur(10px);
  animation:flotarNube linear infinite;
  z-index:6;
}

.nube-dia{
  background:rgba(255,255,255,0.4);
}

.nube-noche{
  background:rgba(100,120,150,0.3);
}

@keyframes flotarNube{
  0%{left:-100px;}
  100%{left:700px;}
}

.rayo{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.4);
  opacity:0;
  animation:relampago 5s infinite;
  z-index:6;
}

@keyframes relampago{
  0%,95%,98%{opacity:0;}
  96%{opacity:0.5;}
  97%{opacity:0;}
}

.copo{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation:nevar linear infinite;
  z-index:6;
}

@keyframes nevar{
  0%{transform:translateY(-10px); opacity:0;}
  20%{opacity:0.8;}
  100%{transform:translateY(150px); opacity:0;}
}
</style>
</head>

<body>

<div class="solar-bar">
  
  <!-- FONDO DINÁMICO CON DOS CAPAS -->
  <div class="fondo-dinamico">
    <div class="capa-dia" id="capaDia"></div>
    <div class="capa-noche" id="capaNoche"></div>
  </div>
  
  <!-- MÁSCARA QUE SIGUE A LA LUNA - CONTROLADA POR JS -->
  <div class="mascara-noche" id="mascaraNoche"></div>

  <!-- CAPA DE CLIMA -->
  <div id="climaCapa" style="position:absolute; width:100%; height:100%; z-index:6; pointer-events:none; overflow:hidden; border-radius:24px;"></div>

  <div class="estrellas" id="estrellas">
    <span style="top:15%;left:55%"></span>
    <span style="top:25%;left:62%"></span>
    <span style="top:35%;left:70%"></span>
    <span style="top:45%;left:78%"></span>
    <span style="top:55%;left:85%"></span>
    <span style="top:20%;left:90%"></span>
    <span style="top:65%;left:72%"></span>
    <span style="top:75%;left:45%"></span>
    <span style="top:30%;left:30%"></span>
    <span style="top:80%;left:15%"></span>
  </div>

  <div class="horizonte"></div>
  <div class="linea"></div>

  <div class="info-bar">
    <div class="clima">
      <span class="temperatura" id="temperatura">--°</span>
      <span class="descripcion" id="clima-desc">TULUÁ</span>
    </div>
    <div class="hora" id="hora-info">04:00:00</div>  <!-- HORA FIJA 4:00 AM -->
  </div>

  <div class="horas">
    <span>00</span> <span>03</span> <span>06</span> <span>09</span> <span>12</span>
    <span>15</span> <span>18</span> <span>21</span> <span>24</span>
  </div>

  <div class="divider"></div>

  <!-- SOL (A LAS 4 AM ESTA EN EL HORIZONTE, CASI AMANECIENDO) -->
  <div id="sol" class="astro" style="left:16.67%"> <!-- 4/24 = 16.67% -->
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="sol-grad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFD966" />
          <stop offset="40%" stop-color="#FFA500" />
          <stop offset="80%" stop-color="#FF4500" />
          <stop offset="100%" stop-color="#FF8C00" />
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="20" fill="url(#sol-grad)" />
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFD966" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.4" />
    </svg>
    <div id="solTag" class="tag sol-tag">☀️ 04:00</div>
  </div>

  <!-- LUNA (A LAS 4 AM LA LUNA ESTA EN POSICIÓN OPUESTA, 4+12=16 -> 16/24=66.67%) -->
  <div id="luna" class="astro" style="left:66.67%"> <!-- 16/24 = 66.67% -->
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="luna-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#FFFFFF" />
          <stop offset="70%" stop-color="#FFF2A6" />
          <stop offset="100%" stop-color="#E6D896" />
        </radialGradient>
        <radialGradient id="luna-sombra-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#777777" />
          <stop offset="70%" stop-color="#666666" />
          <stop offset="100%" stop-color="#555555" />
        </radialGradient>
        <radialGradient id="crater-grad" cx="30%" cy="30%" r="50%">
          <stop offset="0%" stop-color="#D4C87C" stop-opacity="0.6" />
          <stop offset="100%" stop-color="#B8A878" stop-opacity="0.3" />
        </radialGradient>
        
        <mask id="mascara-fase">
          <rect x="0" y="0" width="48" height="48" fill="white" />
          <circle id="sombra-movil" cx="24" cy="24" r="24" fill="black" />
        </mask>
      </defs>
      
      <circle cx="24" cy="24" r="22" fill="url(#luna-grad)"/>
      <circle cx="16" cy="17" r="6" fill="url(#crater-grad)"/>
      <circle cx="30" cy="26" r="5.5" fill="url(#crater-grad)"/>
      <circle cx="22" cy="13" r="5" fill="url(#crater-grad)"/>
      
      <circle cx="24" cy="24" r="22" fill="url(#luna-sombra-grad)" mask="url(#mascara-fase)"/>
      
      <circle cx="16" cy="17" r="6" fill="#666666" opacity="0.3" mask="url(#mascara-fase)"/>
      <circle cx="30" cy="26" r="5.5" fill="#666666" opacity="0.3" mask="url(#mascara-fase)"/>
      <circle cx="22" cy="13" r="5" fill="#666666" opacity="0.3" mask="url(#mascara-fase)"/>
    </svg>
    <div id="lunaTag" class="tag luna-tag">🌑 16:00</div>
  </div>

</div>

<script>
// CÓDIGO MÍNIMO PARA QUE LA MÁSCARA SIGA A LA LUNA EN 4:00 AM
const mascaraNoche = document.getElementById("mascaraNoche");
const estrellas = document.getElementById("estrellas");

// Para las 4:00 AM, la Luna está en posición 16/24 = 0.6667
let posLuna = 16/24; // 0.6667

// Calcular desplazamiento de la máscara (fórmula igual que antes)
let desplazamiento = (posLuna * 60) - 30; // Rango: -30% a +30%
mascaraNoche.style.transform = `translateX(${desplazamiento}%)`;

// Estrellas con opacidad media (amanecer)
estrellas.style.opacity = 0.4;

// Valores fijos para que se vea bien
console.log("Amanecer - 4:00 AM - Sol en 16.67%, Luna en 66.67%");
</script>

</body>
</html>
