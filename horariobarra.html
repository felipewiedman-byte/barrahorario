<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solar Bar · Tuluá · Clima REAL con Nubes y Lluvia VISIBLES</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== DISEÑO ORIGINAL CON MEJORAS DE Z-INDEX ===== */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:'Inter',sans-serif;
}

.solar-bar{
  width:580px;
  height:130px;
  border-radius:24px;
  overflow:hidden !important;
  position:relative;
  backface-visibility: hidden;
}

.fondo-dinamico{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:24px;
  overflow:hidden;
  z-index:1;
}

.capa-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #4AB5FF, #2A7FDD, #1A4FAA);
  opacity:1;
  transition:opacity 0.5s ease;
  z-index:1;
}

.capa-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg, #0A1428, #0B1A2E, #0A1A2C);
  opacity:0;
  transition:opacity 0.5s ease;
  z-index:2;
}

.mascara-dia{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:3;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-dia::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(74,181,255,1) 0%,
    rgba(74,181,255,0.9) 25%,
    rgba(74,181,255,0) 50%,
    rgba(10,20,40,0.9) 75%,
    rgba(10,20,40,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:3;
  left:-50%;
}

.mascara-noche{
  position:absolute;
  width:100%;
  height:100%;
  background:transparent;
  z-index:4;
  pointer-events:none;
  overflow:hidden;
  border-radius:24px;
}

.mascara-noche::before{
  content:"";
  position:absolute;
  width:200%;
  height:100%;
  background:linear-gradient(90deg, 
    rgba(10,20,40,1) 0%,
    rgba(10,20,40,0.9) 25%,
    rgba(10,20,40,0) 50%,
    rgba(74,181,255,0.9) 75%,
    rgba(74,181,255,1) 100%);
  transition:transform 0.1s linear;
  opacity:1;
  z-index:4;
  left:-50%;
}

.sombra-lunar{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:7;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  mix-blend-mode:multiply;
}

.estrellas{
  position:absolute;
  width:100%;
  height:100%;
  z-index:5;
  opacity:0;
  transition:opacity 0.5s ease;
  border-radius:24px;
  overflow:hidden;
  pointer-events:none;
}

.estrellas span{
  position:absolute;
  width:2px;
  height:2px;
  background:#fff;
  border-radius:50%;
  box-shadow:0 0 4px rgba(255,255,255,0.5);
  animation:parpadear 1.5s ease-in-out infinite;
}

@keyframes parpadear{
  0%,100%{opacity:0.3;}
  50%{opacity:1;}
}

.horizonte{
  position:absolute;
  bottom:0;
  width:100%;
  height:40px;
  background:linear-gradient(180deg, #3a2c24, #1e1612);
  border-top:1px solid rgba(200,170,140,0.3);
  z-index:10;
  border-radius:0 0 24px 24px;
}

.horas{
  position:absolute;
  top:10px;
  left:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  font-size:9px;
  font-weight:400;
  color:rgba(255,255,255,0.5);
  z-index:15;
  letter-spacing:0.5px;
}

.astro{
  position:absolute;
  top:45% !important;
  transform:translate(-50%,-50%);
  width:70px;
  height:70px;
  z-index:30;
  transition:left 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
  animation:flotar 5s ease-in-out infinite;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}

@keyframes flotar{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-56%) scale(1.02);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

.astro svg{
  width:100%;
  height:100%;
  display:block;
}

.tag{
  position:absolute;
  font-size:10px;
  font-weight:500;
  color:#ffffff;
  background:rgba(0,0,0,0.65);
  padding:5px 12px;
  border-radius:40px;
  white-space:nowrap;
  z-index:35;
  border:1px solid rgba(255,215,0,0.3);
  letter-spacing:0.5px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}

.sol-tag{
  left:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.luna-tag{
  right:calc(100% + 10px);
  top:50%;
  transform:translateY(-50%);
}

.divider{
  position:absolute;
  left:50%;
  top:0;
  width:1px;
  height:100%;
  background:rgba(255,255,200,0.08);
  z-index:8;
}

.linea{
  position:absolute;
  bottom:40px;
  left:0;
  width:100%;
  height:1px;
  background:rgba(255,220,150,0.15);
  z-index:9;
}

/* ===== EFECTOS DE CLIMA MÁS VISIBLES ===== */
.gota{
  position:absolute;
  width:5px;
  background:linear-gradient(180deg, rgba(100,180,255,0.95), rgba(50,120,200,0.9));
  border-radius:0 0 4px 4px;
  animation:llover linear infinite;
  z-index:6;
  box-shadow:0 0 3px rgba(100,180,255,0.8);
}

@keyframes llover{
  0%{transform:translateY(-20px); opacity:0.9;}
  20%{opacity:1;}
  100%{transform:translateY(150px); opacity:0;}
}

.gota-noche{
  background:linear-gradient(180deg, rgba(150,200,255,0.95), rgba(80,130,220,0.9));
  box-shadow:0 0 5px rgba(150,200,255,0.8);
}

.nube{
  position:absolute;
  background:rgba(255,255,245,0.95);  /* Más opaca para día */
  border-radius:50px;
  filter:blur(8px);
  animation:flotarNube linear infinite;
  z-index:6;
  box-shadow:0 0 20px rgba(255,255,255,0.8);
}

.nube-dia{
  background:rgba(255,255,245,0.95);
}

.nube-noche{
  background:rgba(210,230,250,0.85);  /* Más brillante en noche */
  box-shadow:0 0 25px rgba(180,220,255,0.9);
}

@keyframes flotarNube{
  0%{left:-120px;}
  100%{left:620px;}
}

.rayo{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 50% 40%, rgba(255,255,200,0.9), rgba(255,200,100,0.6), transparent);
  opacity:0;
  animation:relampago 4s infinite;
  z-index:6;
  pointer-events:none;
}

@keyframes relampago{
  0%,92%,94%,96%,98%,100%{opacity:0;}
  93%{opacity:0.8;}
  95%{opacity:1;}
  97%{opacity:0.6;}
  99%{opacity:0.3;}
}
</style>
</head>
<body>

<div class="solar-bar">
  <div class="fondo-dinamico">
    <div class="capa-dia" id="capaDia"></div>
    <div class="capa-noche" id="capaNoche"></div>
  </div>
  
  <div class="mascara-dia" id="mascaraDia"></div>
  <div class="mascara-noche" id="mascaraNoche"></div>

  <div class="sombra-lunar" id="sombraLunar"></div>

  <!-- CAPA DE CLIMA (z-index elevado para que quede sobre máscaras pero bajo el horizonte) -->
  <div id="climaCapa" style="position:absolute; width:100%; height:100%; z-index:12; pointer-events:none; overflow:hidden; border-radius:24px;"></div>

  <div class="estrellas" id="estrellas">
    <span style="top:15%;left:55%;animation-delay:0s"></span>
    <span style="top:25%;left:62%;animation-delay:0.5s"></span>
    <span style="top:35%;left:70%;animation-delay:1s"></span>
    <span style="top:45%;left:78%;animation-delay:1.5s"></span>
    <span style="top:55%;left:85%;animation-delay:2s"></span>
    <span style="top:20%;left:90%;animation-delay:2.5s"></span>
    <span style="top:65%;left:72%;animation-delay:3s"></span>
    <span style="top:75%;left:45%;animation-delay:0.2s"></span>
    <span style="top:30%;left:30%;animation-delay:0.7s"></span>
    <span style="top:80%;left:15%;animation-delay:1.2s"></span>
    <span style="top:12%;left:40%;animation-delay:1.8s"></span>
    <span style="top:70%;left:55%;animation-delay:2.2s"></span>
    <span style="top:40%;left:85%;animation-delay:2.8s"></span>
  </div>

  <div class="horizonte"></div>
  <div class="linea"></div>

  <div class="horas">
    <span>00</span> <span>03</span> <span>06</span> <span>09</span> <span>12</span>
    <span>15</span> <span>18</span> <span>21</span> <span>24</span>
  </div>

  <div class="divider"></div>

  <!-- SOL -->
  <div id="sol" class="astro">
    <svg viewBox="0 0 48 48">
      <defs>
        <radialGradient id="sol-grad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFD966" />
          <stop offset="40%" stop-color="#FFA500" />
          <stop offset="80%" stop-color="#FF4500" />
          <stop offset="100%" stop-color="#FF8C00" />
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="20" fill="url(#sol-grad)" />
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFD966" stroke-width="1.5" stroke-dasharray="3 5" opacity="0.4" />
    </svg>
    <div id="solTag" class="tag sol-tag">☀️ 00:00</div>
  </div>

  <!-- LUNA CON FASES REALES -->
  <div id="luna" class="astro">
    <svg viewBox="0 0 48 48" id="lunaSvg">
      <defs>
        <radialGradient id="luna-grad" cx="30%" cy="30%" r="60%">
          <stop offset="0%" stop-color="#FFF9E6" />
          <stop offset="70%" stop-color="#FFEFB0" />
          <stop offset="100%" stop-color="#F0E090" />
        </radialGradient>
        <mask id="faseMask">
          <rect x="0" y="0" width="48" height="48" fill="white" />
          <circle id="sombraFase" cx="24" cy="24" r="24" fill="black" />
        </mask>
      </defs>
      <circle cx="24" cy="24" r="22" fill="url(#luna-grad)" />
      <circle cx="16" cy="17" r="3.5" fill="rgba(180,150,80,0.5)" />
      <circle cx="33" cy="30" r="3" fill="rgba(160,130,70,0.5)" />
      <circle cx="29" cy="15" r="2.5" fill="rgba(170,140,75,0.5)" />
      <circle cx="38" cy="20" r="2" fill="rgba(150,120,65,0.5)" />
      <circle cx="10" cy="32" r="2" fill="rgba(155,125,70,0.5)" />
      <circle cx="24" cy="24" r="22" fill="rgba(80,70,50,0.85)" mask="url(#faseMask)" />
      <circle cx="24" cy="24" r="24" fill="none" stroke="#FFF2A6" stroke-width="1.5" stroke-dasharray="4 6" opacity="0.4"/>
    </svg>
    <div id="lunaTag" class="tag luna-tag">🌑 00:00</div>
  </div>
</div>

<script>
// ===== CONFIGURACIÓN CON WEATHERAPI (CLAVE NUEVA) =====
const sol = document.getElementById("sol");
const luna = document.getElementById("luna");
const solTag = document.getElementById("solTag");
const lunaTag = document.getElementById("lunaTag");
const sombraFase = document.getElementById("sombraFase");
const estrellas = document.getElementById("estrellas");
const mascaraDia = document.getElementById("mascaraDia");
const mascaraNoche = document.getElementById("mascaraNoche");
const capaDia = document.getElementById("capaDia");
const capaNoche = document.getElementById("capaNoche");
const climaCapa = document.getElementById("climaCapa");
const sombraLunar = document.getElementById("sombraLunar");

const LAT = '4.08466';
const LON = '-76.19536';
const WEATHERAPI_KEY = 'ed887c7d96664bedad980752262403';

function getHoraColombia(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"America/Bogota"}));
}

function formatHora(h){
  let H = Math.floor(h);
  let m = Math.floor((h - H) * 60);
  return `${String(H).padStart(2,"0")}:${String(m).padStart(2,"0")}`;
}

// ========== CÁLCULO DE FASE LUNAR ==========
function calcularFaseLunar() {
  const newMoonDate = new Date(Date.UTC(2026, 2, 19, 10, 23, 0));
  const ahora = new Date();
  const diffMs = ahora - newMoonDate;
  const diffDays = diffMs / (1000 * 60 * 60 * 24);
  const cicloLunar = 29.53058867;
  let fase = (diffDays % cicloLunar) / cicloLunar;
  if (fase < 0) fase += 1;
  return fase;
}

function actualizarMascaraLunar(fase) {
  if (!sombraFase) return;
  let cx;
  if (fase <= 0.5) {
    cx = 24 - (fase * 48);
  } else {
    cx = 24 + ((fase - 0.5) * 48);
  }
  cx = Math.max(0, Math.min(48, cx));
  sombraFase.setAttribute('cx', cx);
}

function getFaseLunarInfo(f) {
  if (f < 0.03 || f > 0.97) return { emoji: '🌑', nombre: 'Luna Nueva' };
  if (f < 0.23) return { emoji: '🌒', nombre: 'Creciente' };
  if (f < 0.27) return { emoji: '🌓', nombre: 'Cuarto Creciente' };
  if (f < 0.47) return { emoji: '🌔', nombre: 'Gibosa Creciente' };
  if (f < 0.53) return { emoji: '🌕', nombre: 'Luna Llena' };
  if (f < 0.73) return { emoji: '🌖', nombre: 'Gibosa Menguante' };
  if (f < 0.77) return { emoji: '🌗', nombre: 'Cuarto Menguante' };
  return { emoji: '🌘', nombre: 'Menguante' };
}

// ========== EFECTOS CLIMÁTICOS MEJORADOS ==========
function crearElementosClima(tipo, cantidad, esNoche){
  const fragment = document.createDocumentFragment();
  
  if(tipo === 'tormenta'){
    const rayoDiv = document.createElement('div');
    rayoDiv.className = 'rayo';
    fragment.appendChild(rayoDiv);
    for(let i = 0; i < cantidad + 40; i++){
      const el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (0.12 + Math.random() * 0.2) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (15 + Math.random() * 20) + 'px';
      el.style.width = (4 + Math.random() * 4) + 'px';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'lluvia'){
    for(let i = 0; i < cantidad + 50; i++){
      const el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (0.15 + Math.random() * 0.25) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (12 + Math.random() * 18) + 'px';
      el.style.width = (4 + Math.random() * 3) + 'px';
      fragment.appendChild(el);
    }
    for(let i = 0; i < 4; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 80 + Math.random() * 110 + 'px';
      el.style.height = 30 + Math.random() * 40 + 'px';
      el.style.top = 10 + Math.random() * 55 + '%';
      el.style.animationDuration = 18 + Math.random() * 14 + 's';
      el.style.animationDelay = -i * 4 + 's';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'llovizna'){
    for(let i = 0; i < cantidad + 25; i++){
      const el = document.createElement('div');
      el.className = `gota ${esNoche ? 'gota-noche' : ''}`;
      el.style.left = Math.random() * 100 + '%';
      el.style.animationDuration = (0.25 + Math.random() * 0.35) + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      el.style.height = (6 + Math.random() * 10) + 'px';
      el.style.width = '2px';
      fragment.appendChild(el);
    }
    for(let i = 0; i < 2; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 80 + Math.random() * 100 + 'px';
      el.style.height = 25 + Math.random() * 30 + 'px';
      el.style.top = 15 + Math.random() * 55 + '%';
      el.style.animationDuration = 20 + Math.random() * 12 + 's';
      el.style.animationDelay = -i * 5 + 's';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'nublado'){
    // nubes grandes y abundantes
    for(let i = 0; i < 8; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 100 + Math.random() * 140 + 'px';
      el.style.height = 35 + Math.random() * 45 + 'px';
      el.style.top = 10 + Math.random() * 60 + '%';
      el.style.animationDuration = 22 + Math.random() * 14 + 's';
      el.style.animationDelay = -i * 4 + 's';
      fragment.appendChild(el);
    }
  }
  else if(tipo === 'nube'){
    for(let i = 0; i < cantidad + 3; i++){
      const el = document.createElement('div');
      el.className = `nube ${esNoche ? 'nube-noche' : 'nube-dia'}`;
      el.style.width = 70 + Math.random() * 90 + 'px';
      el.style.height = 25 + Math.random() * 30 + 'px';
      el.style.top = 15 + Math.random() * 55 + '%';
      el.style.animationDuration = 18 + Math.random() * 16 + 's';
      el.style.animationDelay = -i * 6 + 's';
      fragment.appendChild(el);
    }
  }
  return fragment;
}

function actualizarClimaFondo(condicionTexto, esNoche){
  if(!climaCapa) return;
  
  while(climaCapa.firstChild) climaCapa.removeChild(climaCapa.firstChild);
  
  const texto = condicionTexto.toLowerCase();
  console.log(`🌦️ Condición recibida: "${condicionTexto}" (esNoche=${esNoche})`);
  
  // ===== MAPEO AMPLIADO PARA ESPAÑOL =====
  let efecto = null;
  
  if(texto.includes('tormenta') || texto.includes('trueno') || texto.includes('storm')){
    efecto = 'tormenta';
  }
  else if(texto.includes('lluvia') || texto.includes('precipitaciones') || 
          texto.includes('aguacero') || texto.includes('chaparrón') || 
          texto.includes('chubasco') || texto.includes('rain') || 
          texto.includes('shower')){
    efecto = 'lluvia';
  }
  else if(texto.includes('llovizna') || texto.includes('garúa') || texto.includes('drizzle')){
    efecto = 'llovizna';
  }
  else if(texto.includes('nublado') || texto.includes('cubierto') || 
          texto.includes('nubes') || texto.includes('cloudy') || 
          texto.includes('overcast')){
    efecto = 'nublado';
  }
  else if(texto.includes('parcialmente') || texto.includes('poco nuboso') || 
          texto.includes('mayormente nublado') || texto.includes('few clouds')){
    efecto = 'nube';
  }
  
  if(efecto){
    console.log(`✅ Aplicando efecto: ${efecto}`);
    if(efecto === 'tormenta') climaCapa.appendChild(crearElementosClima('tormenta', 70, esNoche));
    else if(efecto === 'lluvia') climaCapa.appendChild(crearElementosClima('lluvia', 70, esNoche));
    else if(efecto === 'llovizna') climaCapa.appendChild(crearElementosClima('llovizna', 35, esNoche));
    else if(efecto === 'nublado') climaCapa.appendChild(crearElementosClima('nublado', 8, esNoche));
    else if(efecto === 'nube') climaCapa.appendChild(crearElementosClima('nube', 4, esNoche));
  } else {
    console.log('☀️ Clima despejado: sin efectos adicionales');
  }
}

// ========== CLIMA CON WEATHERAPI ==========
function fetchClima() {
  const url = `https://api.weatherapi.com/v1/current.json?key=${WEATHERAPI_KEY}&q=${LAT},${LON}&lang=es`;
  
  fetch(url)
    .then(response => {
      if (!response.ok) {
        throw new Error(`HTTP ${response.status} - ${response.statusText}`);
      }
      return response.json();
    })
    .then(data => {
      const condition = data.current.condition.text;
      const temp = data.current.temp_c;
      const isDay = data.current.is_day === 1;
      
      console.log(`🌡️ Tuluá: ${temp}°C | Condición real: ${condition} | ${isDay ? 'DÍA' : 'NOCHE'}`);
      
      actualizarClimaFondo(condition, !isDay);
    })
    .catch(err => {
      console.error('❌ Error al obtener clima de WeatherAPI:', err);
    });
}

// ========== ACTUALIZACIÓN DE POSICIÓN SOL/LUNA Y FASES ==========
function actualizar(){
  let now = getHoraColombia();
  let h = now.getHours() + now.getMinutes()/60 + now.getSeconds()/3600;

  let solPos = h / 24;
  let lunaPos = (h + 12) / 24;
  if(lunaPos > 1) lunaPos -= 1;

  sol.style.left = (solPos * 100) + "%";
  luna.style.left = (lunaPos * 100) + "%";

  solTag.innerHTML = `☀️ ${formatHora(h)}`;
  
  const fase = calcularFaseLunar();
  const faseInfo = getFaseLunarInfo(fase);
  actualizarMascaraLunar(fase);
  lunaTag.innerHTML = `${faseInfo.emoji} ${formatHora((h+12)%24)} | ${faseInfo.nombre}`;

  let desplazamientoDia = (solPos * 100) - 50;
  mascaraDia.style.transform = `translateX(${desplazamientoDia}%)`;
  let desplazamientoNoche = (lunaPos * 100) - 50;
  mascaraNoche.style.transform = `translateX(${desplazamientoNoche}%)`;
  
  if (h >= 6 && h < 18) {
    estrellas.style.opacity = '0';
    capaNoche.style.opacity = '0';
    capaDia.style.opacity = '1';
    sombraLunar.style.opacity = '0';
  } else {
    estrellas.style.opacity = '0.7';
    capaNoche.style.opacity = '1';
    capaDia.style.opacity = '0';
    const distanciaCentro = Math.abs(lunaPos - 0.5) * 2;
    const brilloLunar = fase < 0.03 || fase > 0.97 ? 0.2 :
                        fase > 0.47 && fase < 0.53 ? 0.8 : 0.5;
    sombraLunar.style.opacity = (distanciaCentro * (1 - brilloLunar * 0.7)).toString();
    sombraLunar.style.background = `radial-gradient(circle at ${lunaPos * 100}% 50%, 
                                    rgba(0,0,0,0) 0%, 
                                    rgba(0,0,0,0.7) 70%)`;
  }
}

// Iniciar
fetchClima();
setInterval(fetchClima, 108000);
setInterval(actualizar, 500);
actualizar();
</script>
